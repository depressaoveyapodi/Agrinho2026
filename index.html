<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoFazenda: Agro Forte e Sustentável - Agrinho 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🌱 EcoFazenda: O Equilíbrio</h1>
        <p>Agrinho 2026: Produção Forte com Respeito à Natureza</p>
    </header>

    <main>
        <section id="status-panel">
            <div class="status-box">💰 Moedas: <span id="money">10</span></div>
            <div class="status-box">💧 Água Disponível: <span id="water-level">100</span>%</div>
            <div class="status-box">✨ Eco-Pontos: <span id="eco-points">0</span></div>
        </section>

        <section id="market-section">
            <h2>🛒 Pedido do Cliente</h2>
            <p id="order-text">Carregando pedido...</p>
            <button id="sell-btn" onclick="deliverOrder()">Entregar Pedido Orgânico</button>
        </section>

        <h2>🚜 Seus Canteiros Sustentáveis</h2>
        <section id="farm-grid">
            </section>
    </main>

    <footer>
        <p>Desenvolvido para o Concurso Agrinho 2026 - Em prol de um futuro sustentável.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
